name: NuGet Publish
run-name: "NuGet Publish | ${{ github.event_name }} | ${{ github.ref_name }} | ${{ github.sha }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ "$VERSION" == refs/* ]] || [[ -z "$VERSION" ]]; then VERSION="0.0.0-dev"; fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Boff.Toolkit
        run: dotnet build src/BoffToolkit/BoffToolkit.csproj -c Release -f net8.0 -p:TargetFrameworks=net8.0 -v minimal

      - name: Pack Boff.Toolkit
        run: dotnet pack src/BoffToolkit/BoffToolkit.csproj -c Release -f net8.0 -p:TargetFrameworks=net8.0 --no-build -o ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
